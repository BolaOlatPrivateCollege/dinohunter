<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ghost Runner</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: Arial;
  transition: background 1s;
  background: linear-gradient(to top, #87CEEB, #cfefff);
}

body.night {
  background: linear-gradient(to top, #0b1a2a, #000814);
  color: white;
}

/* SKY OBJECTS */
#sun, #moon {
  position: absolute;
  width: 60px;
  height: 60px;
  border-radius: 50%;
  top: 50px;
  left: -80px;
}

#sun {
  background: yellow;
  box-shadow: 0 0 40px yellow;
}

#moon {
  background: #ddd;
  box-shadow: 0 0 20px white;
  display: none;
}

/* STARS */
.star {
  position: absolute;
  width: 3px;
  height: 3px;
  background: white;
  opacity: 0;
}

/* RAIN */
.rain {
  position: absolute;
  width: 2px;
  height: 10px;
  background: lightblue;
  opacity: 0.6;
}

/* FOG */
#fog {
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(255,255,255,0.2);
  pointer-events: none;
  display: none;
}

/* GAME */
#game {
  position: relative;
  width: 100%;
  height: 250px;
  overflow: hidden;
}

#dino {
  position: absolute;
  bottom: 20px;
  left: 50px;
  width: 70px;
  height: 70px;
  background: url('images/ghost.png') no-repeat center/contain;
}

.obstacle {
  position: absolute;
  bottom: 20px;
  right: -60px;
  background: url('images/cactus.png') no-repeat center/contain;
}

.cloud {
  position: absolute;
  width: 100px;
  height: 50px;
  background: url('images/cloud.png') no-repeat center/contain;
}

#ground {
  position: absolute;
  bottom: 0;
  width: 200%;
  height: 20px;
  background: repeating-linear-gradient(#555 0 20px, transparent 20px 40px);
}

.explosion {
  position: absolute;
  width: 80px;
  height: 80px;
  background: url('images/explosion.gif') no-repeat center/contain;
}

#score, #highScore {
  position: absolute;
  right: 20px;
}

#score { top: 10px; }
#highScore { top: 30px; }

button {
  padding: 10px 20px;
  margin: 5px;
}
</style>
</head>

<body>

<div id="sun"></div>
<div id="moon"></div>
<div id="fog"></div>

<div id="menu">
  <h1>👻 Ghost Runner</h1>
  <button onclick="startGame()">Start</button>
</div>

<div id="game">
  <div id="dino"></div>
  <div id="ground"></div>
  <div id="score">Score: 0</div>
  <div id="highScore">High: 0</div>
</div>

<script>
const game = document.getElementById("game");
const dino = document.getElementById("dino");
const ground = document.getElementById("ground");
const scoreDisplay = document.getElementById("score");
const highScoreDisplay = document.getElementById("highScore");
const sun = document.getElementById("sun");
const moon = document.getElementById("moon");
const fog = document.getElementById("fog");

let gameRunning=false, gameOver=false;
let score=0, speed=4;
let position=0, velocity=0, jumpCount=0;
let intervals=[], timeouts=[], groundPos=0;

/* HIGH SCORE */
let highScore = localStorage.getItem("dinoHighScore") || 0;
highScoreDisplay.textContent="High: "+highScore;

/* START */
function startGame(){
  resetGame();
  gameRunning=true;
  document.getElementById("menu").style.display="none";

  spawnObstacle();
  spawnCloud();
  moveGround();
  startScore();
  moveSky();
  gameLoop();
}

/* RESET */
function resetGame(){
  intervals.forEach(clearInterval);
  timeouts.forEach(clearTimeout);

  document.querySelectorAll(".obstacle,.cloud,.rain,.star").forEach(e=>e.remove());

  score=0; speed=4; position=0; velocity=0;
  gameOver=false;

  scoreDisplay.textContent="Score: 0";
  ground.style.transform="translateX(0)";
}

/* LOOP */
function gameLoop(){
  if(!gameRunning) return;

  velocity-=1;
  position+=velocity;

  if(position<=0){ position=0; velocity=0; jumpCount=0; }

  dino.style.bottom=(20+position)+"px";
  requestAnimationFrame(gameLoop);
}

/* JUMP */
function jump(){
  if(!gameRunning || gameOver) return;
  if(jumpCount<2){
    velocity=15;
    jumpCount++;
  }
}
document.addEventListener("keydown", e=>{ if(e.code==="Space") jump(); });
document.addEventListener("touchstart", jump);

/* OBSTACLE */
function spawnObstacle(){
  if(!gameRunning) return;

  const obs=document.createElement("div");
  obs.classList.add("obstacle");

  let size=Math.random()*20+40;
  obs.style.width=size+"px";
  obs.style.height=size+"px";

  game.appendChild(obs);

  let move=setInterval(()=>{
    if(gameOver) return;

    let right=parseInt(getComputedStyle(obs).right||-60);
    obs.style.right=(right+speed)+"px";

    if(right>window.innerWidth-100 && position<size){
      triggerGameOver();
    }

    if(right>window.innerWidth){
      obs.remove();
      clearInterval(move);
    }

  },20);

  intervals.push(move);
  timeouts.push(setTimeout(spawnObstacle,1500));
}

/* CLOUD */
function spawnCloud(){
  const c=document.createElement("div");
  c.classList.add("cloud");
  c.style.bottom=(Math.random()*120+100)+"px";
  game.appendChild(c);

  let move=setInterval(()=>{
    let r=parseInt(getComputedStyle(c).right||-100);
    c.style.right=(r+2)+"px";
    if(r>window.innerWidth){ c.remove(); clearInterval(move); }
  },30);

  intervals.push(move);
  timeouts.push(setTimeout(spawnCloud,3000));
}

/* GROUND */
function moveGround(){
  intervals.push(setInterval(()=>{
    if(!gameRunning) return;
    groundPos+=speed;
    ground.style.transform=`translateX(-${groundPos}px)`;
  },20));
}

/* SCORE + SKY EVENTS */
function startScore(){
  intervals.push(setInterval(()=>{
    if(!gameRunning) return;

    score++;
    scoreDisplay.textContent="Score: "+score;

    if(score%50===0) speed+=0.5;

    /* DAY/NIGHT */
    if(score%400===0){
      document.body.classList.toggle("night");
      toggleSky();
      spawnStars();
    }

    /* WEATHER */
    if(score%200===0){
      startRain();
      setTimeout(stopRain,5000);
    }

    if(score%300===0){
      fog.style.display="block";
      setTimeout(()=>fog.style.display="none",4000);
    }

  },100));
}

/* ☀️🌙 SKY MOVEMENT */
function moveSky(){
  let pos=-80;
  intervals.push(setInterval(()=>{
    pos+=1;
    sun.style.left=pos+"px";
    moon.style.left=pos+"px";
    if(pos>window.innerWidth) pos=-80;
  },50));
}

function toggleSky(){
  if(document.body.classList.contains("night")){
    sun.style.display="none";
    moon.style.display="block";
  } else {
    sun.style.display="block";
    moon.style.display="none";
    document.querySelectorAll(".star").forEach(s=>s.remove());
  }
}

/* ⭐ STARS */
function spawnStars(){
  if(!document.body.classList.contains("night")) return;

  for(let i=0;i<50;i++){
    const star=document.createElement("div");
    star.classList.add("star");
    star.style.top=Math.random()*200+"px";
    star.style.left=Math.random()*window.innerWidth+"px";
    star.style.opacity=1;
    document.body.appendChild(star);
  }
}

/* 🌧️ RAIN */
function startRain(){
  let rainInterval=setInterval(()=>{
    for(let i=0;i<5;i++){
      const drop=document.createElement("div");
      drop.classList.add("rain");
      drop.style.left=Math.random()*window.innerWidth+"px";
      drop.style.top="0px";
      document.body.appendChild(drop);

      let fall=setInterval(()=>{
        let top=parseInt(drop.style.top);
        drop.style.top=(top+10)+"px";
        if(top>300){ drop.remove(); clearInterval(fall); }
      },20);
    }
  },100);

  intervals.push(rainInterval);
}

function stopRain(){
  document.querySelectorAll(".rain").forEach(r=>r.remove());
}

/* 💥 */
function explode(){
  const boom=document.createElement("div");
  boom.classList.add("explosion");
  boom.style.left="50px";
  boom.style.bottom=(20+position)+"px";
  game.appendChild(boom);
  setTimeout(()=>boom.remove(),300);
}

/* GAME OVER */
function triggerGameOver(){
  if(gameOver) return;

  gameOver=true;
  gameRunning=false;

  explode();

  intervals.forEach(clearInterval);
  timeouts.forEach(clearTimeout);

  if(score>highScore){
    localStorage.setItem("dinoHighScore", score);
  }

  document.getElementById("menu").style.display="block";
}
</script>
</body>
</html>
