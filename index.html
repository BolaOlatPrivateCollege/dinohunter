<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ghost Runner</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: Arial;
  transition: background 1s ease;
  background: linear-gradient(to top, #87CEEB, #cfefff);
}

body.night {
  color: white;
  background: linear-gradient(to top, #0b1a2a, #000814);
}

/* MENU */
#menu {
  text-align: center;
  margin-top: 10px;
}

/* GAME */
#game {
  position: relative;
  width: 100%;
  height: 250px;
  border-bottom: 3px solid black;
  overflow: hidden;
}

/* WEATHER */
#rain, #fog {
  position: absolute;
  width: 100%;
  height: 100%;
  pointer-events: none;
}

#rain {
  background-image: linear-gradient(rgba(255,255,255,0.4) 2px, transparent 2px);
  background-size: 2px 20px;
  animation: rain 0.3s linear infinite;
  opacity: 0;
}

@keyframes rain {
  from { background-position: 0 0; }
  to { background-position: 0 20px; }
}

#fog {
  background: rgba(255,255,255,0.2);
  backdrop-filter: blur(5px);
  opacity: 0;
  transition: opacity 1s;
}

/* PLAYER */
#dino {
  position: absolute;
  bottom: 20px;
  left: 50px;
  width: 70px;
  height: 70px;
  background: url('images/ghost.png') no-repeat center/contain;
  animation: float 2s ease-in-out infinite;
}

@keyframes float {
  50% { transform: translateY(-8px); }
}

/* OBSTACLE */
.obstacle {
  position: absolute;
  bottom: 20px;
  right: -60px;
  background: url('images/cactus.png') no-repeat center/contain;
}

/* CLOUD */
.cloud {
  position: absolute;
  width: 100px;
  height: 50px;
  background: url('images/cloud.png') no-repeat center/contain;
  opacity: 0.8;
}

/* GROUND */
#ground {
  position: absolute;
  bottom: 0;
  width: 200%;
  height: 20px;
  background: repeating-linear-gradient(#555 0 20px, transparent 20px 40px);
}

/* EXPLOSION */
.explosion {
  position: absolute;
  width: 220px;
  height: 220px;
  background: url('images/explosion.gif') no-repeat center/contain;
  z-index: 999;
  pointer-events: none;
  animation: boomScale 0.4s ease-out;
}

@keyframes boomScale {
  from { transform: scale(0.5); opacity: 0.5; }
  to { transform: scale(1); opacity: 1; }
}

/* SCORE */
#score, #highScore {
  position: absolute;
  right: 20px;
}

#score { top: 10px; }
#highScore { top: 30px; }

button {
  padding: 10px 20px;
  margin: 5px;
}
</style>
</head>

<body>

<div id="menu">
  <h1>👻 Ghost Runner</h1>
  <button onclick="startGame()">Start</button>

  <div>
    🔊 Volume
    <input type="range" id="volumeSlider" min="0" max="1" step="0.05" value="0.5">
    <button onclick="toggleMute()" id="muteBtn">Mute</button>
  </div>
</div>

<div id="game">
  <div id="rain"></div>
  <div id="fog"></div>

  <div id="dino"></div>
  <div id="ground"></div>

  <div id="score">Score: 0</div>
  <div id="highScore">High: 0</div>
</div>

<!-- AUDIO -->
<audio id="bgMusic" src="sounds/bg.mp3" loop></audio>
<audio id="hitSound" src="sounds/explosion.mp3"></audio>

<script>
const game = document.getElementById("game");
const dino = document.getElementById("dino");
const ground = document.getElementById("ground");
const rain = document.getElementById("rain");
const fog = document.getElementById("fog");

const scoreDisplay = document.getElementById("score");
const highScoreDisplay = document.getElementById("highScore");
const menu = document.getElementById("menu");

const bgMusic = document.getElementById("bgMusic");
const hitSound = document.getElementById("hitSound");

const volumeSlider = document.getElementById("volumeSlider");
const muteBtn = document.getElementById("muteBtn");

/* STATE */
let gameRunning = false;
let gameOver = false;
let score = 0;
let speed = 4;

let position = 0;
let velocity = 0;
let jumpCount = 0;

let intervals = [];
let timeouts = [];
let groundPos = 0;

let isMuted = false;

/* LOAD SAVED VOLUME */
let savedVolume = localStorage.getItem("gameVolume");
if(savedVolume !== null){
  volumeSlider.value = savedVolume;
}

/* APPLY VOLUME */
function applyVolume(){
  let vol = isMuted ? 0 : parseFloat(volumeSlider.value);

  bgMusic.volume = vol * 0.6;
  hitSound.volume = vol;

  localStorage.setItem("gameVolume", volumeSlider.value);
}

volumeSlider.addEventListener("input", applyVolume);

function toggleMute(){
  isMuted = !isMuted;
  muteBtn.textContent = isMuted ? "Unmute" : "Mute";
  applyVolume();
}

applyVolume();

/* WEATHER */
function weatherSystem(){
  intervals.push(setInterval(()=>{
    if(!gameRunning) return;

    const rand = Math.random();

    if(rand < 0.4){
      rain.style.opacity = 0;
      fog.style.opacity = 0;
    }
    else if(rand < 0.7){
      rain.style.opacity = 1;
      fog.style.opacity = 0;
    }
    else{
      rain.style.opacity = 0;
      fog.style.opacity = 1;
    }

  },5000));
}

/* HIGH SCORE */
let highScore = localStorage.getItem("dinoHighScore") || 0;
highScoreDisplay.textContent = "High: " + highScore;

/* START */
function startGame(){
  resetGame();
  gameRunning = true;
  menu.style.display = "none";

  bgMusic.currentTime = 0;
  bgMusic.play().catch(()=>{});

  spawnObstacle();
  spawnCloud();
  moveGround();
  startScore();
  weatherSystem();

  gameLoop();
}

/* RESET */
function resetGame(){
  intervals.forEach(clearInterval);
  timeouts.forEach(clearTimeout);

  document.querySelectorAll(".obstacle,.cloud,.explosion").forEach(e=>e.remove());

  score = 0;
  speed = 4;
  position = 0;
  velocity = 0;
  jumpCount = 0;
  groundPos = 0;

  gameRunning = false;
  gameOver = false;

  rain.style.opacity = 0;
  fog.style.opacity = 0;

  scoreDisplay.textContent = "Score: 0";

  bgMusic.pause();
  bgMusic.currentTime = 0;
}

/* LOOP */
function gameLoop(){
  if(!gameRunning) return;

  velocity -= 1;
  position += velocity;

  if(position <= 0){
    position = 0;
    velocity = 0;
    jumpCount = 0;
  }

  dino.style.bottom = (20 + position) + "px";
  requestAnimationFrame(gameLoop);
}

/* JUMP */
function jump(){
  if(!gameRunning || gameOver) return;

  if(jumpCount < 2){
    velocity = 15;
    jumpCount++;
  }
}

document.addEventListener("keydown", e=>{
  if(e.code==="Space") jump();
});
document.addEventListener("touchstart", jump);

/* OBSTACLE */
function spawnObstacle(){
  if(!gameRunning) return;

  const obs = document.createElement("div");
  obs.classList.add("obstacle");

  let size = Math.random()*20 + 40;
  obs.style.width = size+"px";
  obs.style.height = size+"px";
  obs.style.right = "-60px";

  game.appendChild(obs);

  let move = setInterval(()=>{
    if(gameOver) return;

    let right = parseInt(getComputedStyle(obs).right);
    obs.style.right = right + speed + "px";

    if(right > window.innerWidth - 120 && right < window.innerWidth - 40 && position < size){
      triggerGameOver();
    }

    if(right > window.innerWidth){
      obs.remove();
      clearInterval(move);
    }

  },20);

  intervals.push(move);
  timeouts.push(setTimeout(spawnObstacle, Math.random()*2000+1000));
}

/* CLOUD */
function spawnCloud(){
  if(!gameRunning) return;

  const cloud = document.createElement("div");
  cloud.classList.add("cloud");

  cloud.style.bottom = (Math.random()*120+100)+"px";
  cloud.style.right = "-100px";

  game.appendChild(cloud);

  let move = setInterval(()=>{
    let right = parseInt(getComputedStyle(cloud).right);
    cloud.style.right = right + 2 + "px";

    if(right > window.innerWidth){
      cloud.remove();
      clearInterval(move);
    }
  },30);

  intervals.push(move);
  timeouts.push(setTimeout(spawnCloud, Math.random()*3000+2000));
}

/* GROUND */
function moveGround(){
  intervals.push(setInterval(()=>{
    if(!gameRunning) return;
    groundPos += speed;
    ground.style.transform = `translateX(-${groundPos}px)`;
  },20));
}

/* SCORE */
function startScore(){
  intervals.push(setInterval(()=>{
    if(!gameRunning) return;

    score++;
    scoreDisplay.textContent = "Score: " + score;

    speed = Math.min(12, 4 + score/200);

    if(score % 500 === 0){
      document.body.classList.toggle("night");
    }

  },100));
}

/* EXPLOSION */
function explode(){
  const boom = document.createElement("div");
  boom.classList.add("explosion");

  const dinoRect = dino.getBoundingClientRect();
  const gameRect = game.getBoundingClientRect();
  const size = 220;

  boom.style.left = (dinoRect.left - gameRect.left + dinoRect.width/2 - size/2) + "px";
  boom.style.top = (dinoRect.top - gameRect.top + dinoRect.height/2 - size/2) + "px";

  game.appendChild(boom);

  setTimeout(()=>boom.remove(),500);
}

/* GAME OVER */
function triggerGameOver(){
  if(gameOver) return;

  gameOver = true;
  gameRunning = false;

  explode();

  hitSound.currentTime = 0;
  hitSound.play();

  bgMusic.pause();

  intervals.forEach(clearInterval);
  timeouts.forEach(clearTimeout);

  if(score > highScore){
    localStorage.setItem("dinoHighScore", score);
  }

  menu.style.display = "block";
}

</script>
</body>
</html>
