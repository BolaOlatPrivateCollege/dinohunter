<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ghost Runner Ultimate</title>

<style>
body {
  margin: 0;
  background: #f7f7f7;
  overflow: hidden;
  font-family: Arial;
}

body.night {
  background: #111;
  color: white;
}

#game {
  position: relative;
  width: 100%;
  height: 250px;
  border-bottom: 3px solid black;
}

body.night #game {
  border-color: white;
}

/* 👻 Ghost with floating animation */
#dino {
  position: absolute;
  bottom: 0;
  left: 50px;
  width: 70px;
  height: 70px;
  background: url('images/ghost.png') no-repeat center/contain;
  animation: float 2s infinite ease-in-out;
}

@keyframes float {
  0% { transform: translateY(0px); }
  50% { transform: translateY(-5px); }
  100% { transform: translateY(0px); }
}

/* 🌵 cactus */
.obstacle {
  position: absolute;
  bottom: 0;
  right: -60px;
  background: url('images/cactus.png') no-repeat center/contain;
}

/* ☁️ cloud */
.cloud {
  position: absolute;
  width: 100px;
  height: 50px;
  background: url('images/cloud.png') no-repeat center/contain;
  opacity: 0.8;
}

.explosion {
  position: absolute;
  width: 80px;
  height: 80px;
  background: url('images/explosion.gif') no-repeat center/contain;
}

#score, #highScore {
  position: absolute;
  right: 20px;
}

#score { top: 10px; }
#highScore { top: 30px; }

#menu {
  position: absolute;
  top: 35%;
  width: 100%;
  text-align: center;
}

button {
  padding: 10px 20px;
  margin: 5px;
  cursor: pointer;
}
</style>
</head>

<body>

<div id="menu">
  <h1>👻 Ghost Runner</h1>
  <button onclick="startGame()">Start</button>
  <button onclick="resetGame()">Restart</button>
</div>

<div id="game">
  <div id="dino"></div>
  <div id="score">Score: 0</div>
  <div id="highScore">High: 0</div>
</div>

<script>
const game = document.getElementById("game");
const dino = document.getElementById("dino");
const scoreDisplay = document.getElementById("score");
const highScoreDisplay = document.getElementById("highScore");
const menu = document.getElementById("menu");

/* ===== STATE ===== */
let score, speed, gameRunning, paused, position, velocity, jumpCount;
let intervals = [];
let objects = [];

/* ===== HIGH SCORE ===== */
let highScore = localStorage.getItem("dinoHighScore") || 0;
highScoreDisplay.innerHTML = "High: " + highScore;

/* ===== RESET SYSTEM (NO RELOAD) ===== */
function resetGame() {
  // clear objects
  objects.forEach(obj => obj.remove());
  objects = [];

  intervals.forEach(i => clearInterval(i));
  intervals = [];

  score = 0;
  speed = 4;
  gameRunning = false;
  paused = false;
  position = 0;
  velocity = 0;
  jumpCount = 0;

  dino.style.bottom = "0px";
  scoreDisplay.innerHTML = "Score: 0";

  menu.style.display = "block";
}

/* ===== START ===== */
function startGame() {
  if (gameRunning) return;

  menu.style.display = "none";
  gameRunning = true;

  loop();
  createObstacle();
  createCloud();
}

/* ===== PHYSICS ===== */
function loop() {
  if (!gameRunning) return;

  velocity -= 1;
  position += velocity;

  if (position <= 0) {
    position = 0;
    velocity = 0;
    jumpCount = 0;
  }

  dino.style.bottom = position + "px";

  requestAnimationFrame(loop);
}

function jump() {
  if (!gameRunning) return;
  if (jumpCount < 2) {
    velocity = 15;
    jumpCount++;
  }
}

document.addEventListener("keydown", e => {
  if (e.code === "Space") jump();
});
document.addEventListener("touchstart", jump);

/* ===== MULTI CACTUS ===== */
function createObstacle() {
  if (!gameRunning) return;

  let count = Math.random() < 0.4 ? 2 : 1;

  for (let i = 0; i < count; i++) {
    const obstacle = document.createElement("div");
    obstacle.classList.add("obstacle");

    let size = Math.random() * 20 + 40;

    obstacle.style.width = size + "px";
    obstacle.style.height = size + "px";
    obstacle.style.right = (-60 - i * 50) + "px";

    game.appendChild(obstacle);
    objects.push(obstacle);

    let move = setInterval(() => {
      let right = parseInt(getComputedStyle(obstacle).right);
      obstacle.style.right = right + speed + "px";

      if (right > window.innerWidth - 120 &&
          right < window.innerWidth - 40 &&
          position < size) {
        explode();
        endGame();
      }

      if (right > window.innerWidth) {
        obstacle.remove();
        clearInterval(move);
      }
    }, 20);

    intervals.push(move);
  }

  setTimeout(createObstacle, Math.random() * 2000 + 1000);
}

/* ===== CLOUD ===== */
function createCloud() {
  if (!gameRunning) return;

  const cloud = document.createElement("div");
  cloud.classList.add("cloud");

  cloud.style.bottom = (Math.random() * 120 + 100) + "px";
  cloud.style.right = "-100px";

  game.appendChild(cloud);
  objects.push(cloud);

  let move = setInterval(() => {
    let right = parseInt(getComputedStyle(cloud).right);
    cloud.style.right = right + 2 + "px";

    if (right > window.innerWidth) {
      cloud.remove();
      clearInterval(move);
    }
  }, 30);

  intervals.push(move);

  setTimeout(createCloud, Math.random() * 3000 + 2000);
}

/* ===== SCORE ===== */
setInterval(() => {
  if (!gameRunning) return;

  score++;
  scoreDisplay.innerHTML = "Score: " + score;

  speed = 4 + (score / 200);
  if (speed > 12) speed = 12;

  if (score % 500 === 0) {
    document.body.classList.toggle("night");
  }
}, 100);

/* ===== EXPLOSION ===== */
function explode() {
  const boom = document.createElement("div");
  boom.classList.add("explosion");

  boom.style.left = "50px";
  boom.style.bottom = position + "px";

  game.appendChild(boom);

  setTimeout(() => boom.remove(), 500);
}

/* ===== END GAME ===== */
function endGame() {
  gameRunning = false;

  intervals.forEach(i => clearInterval(i));

  if (score > highScore) {
    localStorage.setItem("dinoHighScore", score);
  }

  menu.style.display = "block";
}

/* INIT */
resetGame();
</script>

</body>
</html>
