<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ghost Runner</title>

<style>
body {
  margin: 0;
  background: #f7f7f7;
  overflow: hidden;
  font-family: Arial;
}

body.night {
  background: #111;
  color: white;
}

#game {
  position: relative;
  width: 100%;
  height: 250px;
  border-bottom: 3px solid black;
}

body.night #game {
  border-color: white;
}

/* 👻 BIGGER GHOST */
#dino {
  position: absolute;
  bottom: 0;
  left: 50px;
  width: 70px;
  height: 70px;
  background: url('images/ghost.png') no-repeat center/contain;
}

/* 🌵 CACTUS */
.obstacle {
  position: absolute;
  bottom: 0;
  right: -60px;
  width: 40px;
  height: 60px;
  background: url('images/cactus.png') no-repeat center/contain;
}

/* ☁️ BIGGER CLOUD */
.cloud {
  position: absolute;
  width: 100px;
  height: 50px;
  background: url('images/cloud.png') no-repeat center/contain;
  opacity: 0.8;
}

.explosion {
  position: absolute;
  width: 80px;
  height: 80px;
  background: url('images/explosion.gif') no-repeat center/contain;
}

#score, #highScore {
  position: absolute;
  right: 20px;
}

#score { top: 10px; }
#highScore { top: 30px; }

#menu {
  position: absolute;
  top: 40%;
  width: 100%;
  text-align: center;
}

button {
  padding: 10px 20px;
  margin: 5px;
  font-size: 16px;
  cursor: pointer;
}
</style>
</head>

<body>

<div id="menu">
  <h1>👻 Ghost Runner</h1>
  <button onclick="startGame()">Start</button>
  <button onclick="restartGame()">Restart</button>
  <button onclick="togglePause()">Pause / Resume</button>
</div>

<div id="game">
  <div id="dino"></div>
  <div id="score">Score: 0</div>
  <div id="highScore">High: 0</div>
</div>

<audio id="jumpSound" src="https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg"></audio>
<audio id="hitSound" src="https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg"></audio>

<script>
const game = document.getElementById("game");
const dino = document.getElementById("dino");
const scoreDisplay = document.getElementById("score");
const highScoreDisplay = document.getElementById("highScore");
const menu = document.getElementById("menu");

const jumpSound = document.getElementById("jumpSound");
const hitSound = document.getElementById("hitSound");

/* ===== STATE ===== */
let score = 0;
let speed = 4;
let gameRunning = false;
let paused = false;
let gameOverState = false;

let intervals = []; // track all intervals

/* ===== HIGH SCORE ===== */
let highScore = localStorage.getItem("dinoHighScore") || 0;
highScoreDisplay.innerHTML = "High: " + highScore;

/* ===== START ===== */
function startGame() {
  if (gameRunning) return;

  menu.style.display = "none";
  gameRunning = true;
  gameOverState = false;

  loop();
  createObstacle();
  createCloud();
}

function restartGame() {
  location.reload();
}

function togglePause() {
  if (!gameRunning || gameOverState) return;
  paused = !paused;
}

/* ===== PHYSICS ===== */
let velocity = 0;
let gravity = 1;
let position = 0;
let jumpCount = 0;

function loop() {
  if (!gameRunning) return;

  if (!paused) {
    velocity -= gravity;
    position += velocity;

    if (position <= 0) {
      position = 0;
      velocity = 0;
      jumpCount = 0;
    }

    dino.style.bottom = position + "px";
  }

  requestAnimationFrame(loop);
}

function jump() {
  if (!gameRunning || paused || gameOverState) return;

  if (jumpCount < 2) {
    velocity = 15;
    jumpCount++;
    jumpSound.play();
  }
}

document.addEventListener("keydown", e => {
  if (e.code === "Space") jump();
});
document.addEventListener("touchstart", jump);

/* ===== OBSTACLES ===== */
function createObstacle() {
  if (!gameRunning) return;

  const obstacle = document.createElement("div");
  obstacle.classList.add("obstacle");

  let scale = Math.random() * 0.5 + 0.8;
  obstacle.style.transform = `scale(${scale})`;

  obstacle.style.right = "-60px";
  game.appendChild(obstacle);

  let move = setInterval(() => {
    if (paused || gameOverState) return;

    let right = parseInt(getComputedStyle(obstacle).right);
    obstacle.style.right = right + speed + "px";

    // 💥 COLLISION (STRICT STOP)
    if (right > window.innerWidth - 120 &&
        right < window.innerWidth - 40 &&
        position < 60) {

      explode();
      endGame();
      clearInterval(move);
    }

    if (right > window.innerWidth) {
      obstacle.remove();
      clearInterval(move);
    }
  }, 20);

  intervals.push(move);

  setTimeout(createObstacle, Math.random() * 2000 + 1000);
}

/* ===== CLOUD ===== */
function createCloud() {
  if (!gameRunning) return;

  const cloud = document.createElement("div");
  cloud.classList.add("cloud");

  cloud.style.bottom = (Math.random() * 120 + 100) + "px";
  cloud.style.right = "-100px";

  game.appendChild(cloud);

  let move = setInterval(() => {
    if (paused || gameOverState) return;

    let right = parseInt(getComputedStyle(cloud).right);
    cloud.style.right = right + 2 + "px";

    if (right > window.innerWidth) {
      cloud.remove();
      clearInterval(move);
    }
  }, 30);

  intervals.push(move);

  setTimeout(createCloud, Math.random() * 3000 + 2000);
}

/* ===== SCORE ===== */
let scoreLoop = setInterval(() => {
  if (!gameRunning || paused || gameOverState) return;

  score++;
  scoreDisplay.innerHTML = "Score: " + score;

  speed = 4 + (score / 200);
  if (speed > 12) speed = 12;

  if (score % 500 === 0) {
    document.body.classList.toggle("night");
  }
}, 100);

/* ===== EXPLOSION ===== */
function explode() {
  const boom = document.createElement("div");
  boom.classList.add("explosion");

  boom.style.left = "50px";
  boom.style.bottom = position + "px";

  game.appendChild(boom);

  setTimeout(() => boom.remove(), 500);
}

/* ===== END GAME (NO RELOAD) ===== */
function endGame() {
  gameRunning = false;
  gameOverState = true;
  hitSound.play();

  // stop all intervals
  intervals.forEach(i => clearInterval(i));

  if (score > highScore) {
    localStorage.setItem("dinoHighScore", score);
  }

  menu.style.display = "block";
}
</script>

</body>
</html>
