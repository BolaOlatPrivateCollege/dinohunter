<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ghost Runner</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: Arial;
  background: url('images/desert.jpg') no-repeat center/cover;
}

/* DARK OVERLAY */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.3);
  z-index: 0;
}

/* MENU */
#menu {
  text-align: center;
  margin-bottom: 10px;
  color: white;
  position: relative;
  z-index: 2;
}

#menu h1 {
  text-shadow: 2px 2px 10px black;
}

/* GAME */
#game {
  position: relative;
  width: 100%;
  height: 250px;
  overflow: hidden;
  z-index: 1;
}

/* GHOST */
#dino {
  position: absolute;
  bottom: 20px;
  left: 50px;
  width: 70px;
  height: 70px;
  background: url('images/ghost.png') no-repeat center/contain;
  z-index: 2;
}

/* CACTUS */
.obstacle {
  position: absolute;
  bottom: 20px;
  right: -60px;
  background: url('images/cactus.png') no-repeat center/contain;
  z-index: 2;
}

/* CLOUD */
.cloud {
  position: absolute;
  width: 100px;
  height: 50px;
  background: url('images/cloud.png') no-repeat center/contain;
  opacity: 0.8;
}

/* GROUND */
#ground {
  position: absolute;
  bottom: 0;
  width: 200%;
  height: 20px;
  background: repeating-linear-gradient(
    to right,
    #444 0px,
    #444 20px,
    transparent 20px,
    transparent 40px
  );
}

/* 💥 MASSIVE EXPLOSION */
.explosion {
  position: absolute;
  width: 350px;
  height: 350px;
  background: url('images/explosion.gif') no-repeat center/contain;
  z-index: 999;
  pointer-events: none;
}

/* SHAKE */
.shake {
  animation: shake 0.4s;
}

@keyframes shake {
  0% { transform: translate(0,0); }
  25% { transform: translate(-12px,6px); }
  50% { transform: translate(12px,-6px); }
  75% { transform: translate(-6px,6px); }
  100% { transform: translate(0,0); }
}

/* SCORE */
#score, #highScore {
  position: absolute;
  right: 20px;
  color: white;
}

#score { top: 10px; }
#highScore { top: 30px; }

.score {
  transition: transform 0.2s ease;
}

.score.pop {
  transform: scale(1.4);
}

button {
  padding: 10px 20px;
  margin: 5px;
  cursor: pointer;
}
</style>
</head>

<body>

<div id="menu">
  <h1>👻 Ghost Runner</h1>
  <button onclick="startGame()">Start</button>
  <button onclick="resetGame()">Restart</button>
</div>

<div id="game">
  <div id="dino"></div>
  <div id="ground"></div>
  <div id="score" class="score">Score: 0</div>
  <div id="highScore">High: 0</div>
</div>

<audio id="jumpSound" src="https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg"></audio>
<audio id="hitSound" src="https://actions.google.com/sounds/v1/cartoon/explosion.ogg"></audio>
<audio id="bgMusic" src="https://actions.google.com/sounds/v1/ambiences/desert_wind.ogg" loop></audio>

<script>
const game = document.getElementById("game");
const dino = document.getElementById("dino");
const ground = document.getElementById("ground");
const scoreDisplay = document.getElementById("score");
const highScoreDisplay = document.getElementById("highScore");
const menu = document.getElementById("menu");

const jumpSound = document.getElementById("jumpSound");
const hitSound = document.getElementById("hitSound");
const bgMusic = document.getElementById("bgMusic");

let gameRunning = false;
let gameOver = false;

let score = 0;
let speed = 4;

let position = 0;
let velocity = 0;
let jumpCount = 0;

let intervals = [];
let timeouts = [];
let scoreInterval;
let groundPos = 0;

let lastObstacle = null;

/* HIGH SCORE */
let highScore = localStorage.getItem("dinoHighScore") || 0;
highScoreDisplay.innerHTML = "High: " + highScore;

/* START */
function startGame() {
  if (gameRunning) return;

  resetGame();

  gameRunning = true;
  menu.style.display = "none";

  startScore();
  spawnObstacle();
  spawnCloud();
  moveGround();

  bgMusic.volume = 0.4;
  bgMusic.play().catch(()=>{});

  gameLoop();
}

/* RESET */
function resetGame() {
  intervals.forEach(clearInterval);
  timeouts.forEach(clearTimeout);
  clearInterval(scoreInterval);

  document.querySelectorAll(".obstacle, .cloud, .explosion")
    .forEach(el => el.remove());

  intervals = [];
  timeouts = [];

  score = 0;
  speed = 4;
  position = 0;
  velocity = 0;
  jumpCount = 0;
  groundPos = 0;

  gameRunning = false;
  gameOver = false;

  dino.style.bottom = "20px";
  scoreDisplay.innerHTML = "Score: 0";

  ground.style.transform = "translateX(0)";

  bgMusic.pause();
  bgMusic.currentTime = 0;

  menu.style.display = "block";
}

/* LOOP */
function gameLoop() {
  if (!gameRunning) return;

  velocity -= 1;
  position += velocity;

  if (position <= 0) {
    position = 0;
    velocity = 0;
    jumpCount = 0;
  }

  dino.style.bottom = (20 + position) + "px";

  requestAnimationFrame(gameLoop);
}

/* JUMP */
function jump() {
  if (!gameRunning || gameOver) return;

  if (jumpCount < 2) {
    velocity = 15;
    jumpCount++;

    jumpSound.currentTime = 0;
    jumpSound.play();
  }
}

document.addEventListener("keydown", e => {
  if (e.code === "Space") jump();
});
document.addEventListener("touchstart", jump);

/* OBSTACLE */
function spawnObstacle() {
  if (!gameRunning) return;

  const obs = document.createElement("div");
  obs.classList.add("obstacle");

  let size = Math.random() * 20 + 40;

  obs.style.width = size + "px";
  obs.style.height = size + "px";
  obs.style.right = "-60px";

  game.appendChild(obs);
  lastObstacle = obs;

  let move = setInterval(() => {
    if (gameOver) return;

    let right = parseInt(getComputedStyle(obs).right);
    obs.style.right = right + speed + "px";

    if (
      right > window.innerWidth - 120 &&
      right < window.innerWidth - 40 &&
      position < size
    ) {
      triggerGameOver();
    }

    if (right > window.innerWidth) {
      obs.remove();
      clearInterval(move);
    }

  }, 20);

  intervals.push(move);

  let t = setTimeout(spawnObstacle, Math.random() * 2000 + 1000);
  timeouts.push(t);
}

/* CLOUD */
function spawnCloud() {
  if (!gameRunning) return;

  const cloud = document.createElement("div");
  cloud.classList.add("cloud");

  cloud.style.bottom = (Math.random() * 120 + 100) + "px";
  cloud.style.right = "-100px";

  game.appendChild(cloud);

  let move = setInterval(() => {
    let right = parseInt(getComputedStyle(cloud).right);
    cloud.style.right = right + 2 + "px";

    if (right > window.innerWidth) {
      cloud.remove();
      clearInterval(move);
    }
  }, 30);

  intervals.push(move);

  let t = setTimeout(spawnCloud, Math.random() * 3000 + 2000);
  timeouts.push(t);
}

/* GROUND */
function moveGround() {
  let groundInterval = setInterval(() => {
    if (!gameRunning) return;

    groundPos += speed;
    ground.style.transform = `translateX(-${groundPos}px)`;

  }, 20);

  intervals.push(groundInterval);
}

/* SCORE */
function startScore() {
  scoreInterval = setInterval(() => {
    if (!gameRunning) return;

    score++;
    scoreDisplay.innerHTML = "Score: " + score;

    scoreDisplay.classList.add("pop");
    setTimeout(() => scoreDisplay.classList.remove("pop"), 150);

    speed = Math.min(12, 4 + score / 200);
  }, 100);
}

/* 💥 MASSIVE EXPLOSION CENTERED */
function explode() {
  const boom = document.createElement("div");
  boom.classList.add("explosion");

  const dinoRect = dino.getBoundingClientRect();
  const obsRect = lastObstacle?.getBoundingClientRect();
  const gameRect = game.getBoundingClientRect();

  let centerX = dinoRect.left;
  if (obsRect) centerX = (dinoRect.left + obsRect.left) / 2;

  boom.style.left = (centerX - gameRect.left - 175) + "px";
  boom.style.bottom = (20 + position - 100) + "px";

  game.appendChild(boom);

  game.classList.add("shake");
  setTimeout(() => game.classList.remove("shake"), 400);

  setTimeout(() => boom.remove(), 600);
}

/* GAME OVER */
function triggerGameOver() {
  if (gameOver) return;

  gameOver = true;
  gameRunning = false;

  explode();

  intervals.forEach(clearInterval);
  timeouts.forEach(clearTimeout);
  clearInterval(scoreInterval);

  bgMusic.pause();

  hitSound.currentTime = 0;
  hitSound.play();

  if (score > highScore) {
    localStorage.setItem("dinoHighScore", score);
  }

  menu.style.display = "block";
}

resetGame();
</script>

</body>
</html>
