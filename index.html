<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ghost Runner</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: Arial;
  background: url('images/desert.jpg') no-repeat center/cover;
}

/* MENU */
#menu {
  text-align: center;
  color: white;
}

#menu h1 {
  text-shadow: 2px 2px 10px black;
}

/* GAME */
#game {
  position: relative;
  width: 100%;
  height: 250px;
  overflow: hidden;
}

/* 👻 */
#dino {
  position: absolute;
  bottom: 20px;
  left: 50px;
  width: 70px;
  height: 70px;
  background: url('images/ghost.png') no-repeat center/contain;
}

/* 🌵 */
.obstacle {
  position: absolute;
  bottom: 20px;
  right: -60px;
  background: url('images/cactus.png') no-repeat center/contain;
}

/* ☁️ */
.cloud {
  position: absolute;
  width: 100px;
  height: 50px;
  background: url('images/cloud.png') no-repeat center/contain;
  opacity: 0.8;
}

/* 🌵 GROUND */
#ground {
  position: absolute;
  bottom: 0;
  width: 200%;
  height: 20px;
  background: repeating-linear-gradient(
    to right,
    #444 0px,
    #444 20px,
    transparent 20px,
    transparent 40px
  );
}

/* 💥 MASSIVE EXPLOSION */
.explosion {
  position: absolute;
  width: 350px;
  height: 350px;
  background: url('images/explosion.gif') no-repeat center/contain;
  z-index: 999;
}

/* SHAKE */
.shake {
  animation: shake 0.4s;
}

@keyframes shake {
  0% { transform: translate(0,0); }
  25% { transform: translate(-12px,6px); }
  50% { transform: translate(12px,-6px); }
  75% { transform: translate(-6px,6px); }
  100% { transform: translate(0,0); }
}

/* SCORE */
#score {
  position: absolute;
  right: 20px;
  top: 10px;
  color: white;
  font-weight: bold;
}

/* BUTTON */
button {
  padding: 10px 20px;
  margin: 5px;
}
</style>
</head>

<body>

<div id="menu">
  <h1>👻 Ghost Runner</h1>
  <button onclick="startGame()">Start</button>
  <button onclick="resetGame()">Restart</button>
</div>

<div id="game">
  <div id="dino"></div>
  <div id="ground"></div>
  <div id="score">Score: 0</div>
</div>

<script>
const game = document.getElementById("game");
const dino = document.getElementById("dino");
const ground = document.getElementById("ground");
const scoreDisplay = document.getElementById("score");
const menu = document.getElementById("menu");

let gameRunning = false;
let gameOver = false;
let explosionTriggered = false;

let position = 0;
let velocity = 0;
let jumpCount = 0;

let score = 0;
let speed = 4;

let intervals = [];
let timeouts = [];
let groundPos = 0;

let currentObstacle = null;

/* START */
function startGame() {
  if (gameRunning) return;

  resetGame();
  gameRunning = true;
  menu.style.display = "none";

  spawnObstacle();
  spawnCloud();
  moveGround();
  startScore();
  gameLoop();
}

/* RESET */
function resetGame() {
  intervals.forEach(clearInterval);
  timeouts.forEach(clearTimeout);

  document.querySelectorAll(".obstacle, .cloud, .explosion")
    .forEach(el => el.remove());

  intervals = [];
  timeouts = [];

  score = 0;
  speed = 4;
  position = 0;
  velocity = 0;
  jumpCount = 0;
  groundPos = 0;

  gameRunning = false;
  gameOver = false;
  explosionTriggered = false;

  dino.style.bottom = "20px";
  scoreDisplay.innerHTML = "Score: 0";
  ground.style.transform = "translateX(0)";
}

/* LOOP */
function gameLoop() {
  if (!gameRunning) return;

  velocity -= 1;
  position += velocity;

  if (position <= 0) {
    position = 0;
    velocity = 0;
    jumpCount = 0;
  }

  dino.style.bottom = (20 + position) + "px";

  requestAnimationFrame(gameLoop);
}

/* JUMP */
document.addEventListener("keydown", e => {
  if (!gameRunning || gameOver) return;

  if (e.code === "Space" && jumpCount < 2) {
    velocity = 15;
    jumpCount++;
  }
});

/* OBSTACLE */
function spawnObstacle() {
  if (!gameRunning) return;

  const obs = document.createElement("div");
  obs.classList.add("obstacle");

  let size = Math.random() * 20 + 40;

  obs.style.width = size + "px";
  obs.style.height = size + "px";
  obs.style.right = "-60px";

  game.appendChild(obs);
  currentObstacle = obs;

  let move = setInterval(() => {
    if (!gameRunning || gameOver) return;

    let right = parseInt(getComputedStyle(obs).right);
    obs.style.right = right + speed + "px";

    // collision
    if (
      right > window.innerWidth - 120 &&
      right < window.innerWidth - 40 &&
      position < size
    ) {
      triggerGameOver(obs);
    }

    if (right > window.innerWidth) {
      obs.remove();
      clearInterval(move);
    }

  }, 20);

  intervals.push(move);

  let t = setTimeout(spawnObstacle, Math.random()*2000+1000);
  timeouts.push(t);
}

/* CLOUD */
function spawnCloud() {
  if (!gameRunning) return;

  const cloud = document.createElement("div");
  cloud.classList.add("cloud");

  cloud.style.bottom = (Math.random()*120+100)+"px";
  cloud.style.right = "-100px";

  game.appendChild(cloud);

  let move = setInterval(()=>{
    let right = parseInt(getComputedStyle(cloud).right);
    cloud.style.right = right + 2 + "px";

    if(right > window.innerWidth){
      cloud.remove();
      clearInterval(move);
    }
  },30);

  intervals.push(move);

  let t = setTimeout(spawnCloud, Math.random()*3000+2000);
  timeouts.push(t);
}

/* GROUND */
function moveGround(){
  let g = setInterval(()=>{
    if(!gameRunning) return;
    groundPos += speed;
    ground.style.transform = `translateX(-${groundPos}px)`;
  },20);

  intervals.push(g);
}

/* SCORE */
function startScore(){
  let s = setInterval(()=>{
    if(!gameRunning) return;
    score++;
    scoreDisplay.innerHTML = "Score: " + score;
  },100);

  intervals.push(s);
}

/* 💥 EXPLOSION (ACCURATE POSITION) */
function explode(obs){
  if(explosionTriggered) return;
  explosionTriggered = true;

  const boom = document.createElement("div");
  boom.classList.add("explosion");

  const obsRect = obs.getBoundingClientRect();
  const gameRect = game.getBoundingClientRect();

  const x = obsRect.left - gameRect.left;
  const y = obsRect.top - gameRect.top;

  boom.style.left = (x - 140) + "px";
  boom.style.top = (y - 140) + "px";

  game.appendChild(boom);

  game.classList.add("shake");
  setTimeout(()=>game.classList.remove("shake"),400);

  setTimeout(()=>boom.remove(),600);
}

/* GAME OVER */
function triggerGameOver(obs){
  if(gameOver) return;

  gameOver = true;
  gameRunning = false;

  explode(obs);

  intervals.forEach(clearInterval);
  timeouts.forEach(clearTimeout);

  menu.style.display = "block";
}
</script>

</body>
</html>
