<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ghost Runner</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: Arial;
  background: url('images/desert.jpg') no-repeat center/cover;
}

/* MENU */
#menu {
  text-align: center;
  color: white;
}

#menu h1 {
  text-shadow: 2px 2px 10px black;
}

/* GAME */
#game {
  position: relative;
  width: 100%;
  height: 250px;
  overflow: hidden;
}

/* 👻 */
#dino {
  position: absolute;
  bottom: 20px;
  left: 50px;
  width: 70px;
  height: 70px;
  background: url('images/ghost.png') no-repeat center/contain;
}

/* 🌵 */
.obstacle {
  position: absolute;
  bottom: 20px;
  right: -60px;
  background: url('images/cactus.png') no-repeat center/contain;
}

/* 🌵 GROUND */
#ground {
  position: absolute;
  bottom: 0;
  width: 200%;
  height: 20px;
  background: repeating-linear-gradient(
    to right,
    #444 0px,
    #444 20px,
    transparent 20px,
    transparent 40px
  );
}

/* 💥 EXPLOSION */
.explosion {
  position: absolute;
  width: 350px;
  height: 350px;
  background: url('images/explosion.gif') no-repeat center/contain;
  z-index: 999;
}

/* SHAKE */
.shake {
  animation: shake 0.4s;
}

@keyframes shake {
  0% { transform: translate(0,0); }
  25% { transform: translate(-12px,6px); }
  50% { transform: translate(12px,-6px); }
  75% { transform: translate(-6px,6px); }
  100% { transform: translate(0,0); }
}

/* SCORE */
#score {
  position: absolute;
  right: 20px;
  top: 10px;
  color: white;
}

button {
  padding: 10px 20px;
  margin: 5px;
}
</style>
</head>

<body>

<div id="menu">
  <h1>👻 Ghost Runner</h1>
  <button onclick="startGame()">Start</button>
</div>

<div id="game">
  <div id="dino"></div>
  <div id="ground"></div>
  <div id="score">Score: 0</div>
</div>

<script>
const game = document.getElementById("game");
const dino = document.getElementById("dino");
const ground = document.getElementById("ground");
const scoreDisplay = document.getElementById("score");
const menu = document.getElementById("menu");

/* STATE */
let gameRunning = false;
let gameOver = false;
let explosionTriggered = false;

let position = 0;
let velocity = 0;
let jumpCount = 0;

let score = 0;
let speed = 4;

let intervals = [];
let timeouts = [];
let groundPos = 0;
let lastObstacle = null;

/* START */
function startGame() {
  if (gameRunning) return;

  resetGame();
  gameRunning = true;
  menu.style.display = "none";

  spawnObstacle();
  moveGround();
  startScore();
  gameLoop();
}

/* RESET */
function resetGame() {
  intervals.forEach(clearInterval);
  timeouts.forEach(clearTimeout);

  document.querySelectorAll(".obstacle, .explosion")
    .forEach(el => el.remove());

  intervals = [];
  timeouts = [];

  position = 0;
  velocity = 0;
  jumpCount = 0;
  score = 0;
  speed = 4;
  groundPos = 0;

  gameRunning = false;
  gameOver = false;
  explosionTriggered = false;

  dino.style.bottom = "20px";
  scoreDisplay.innerHTML = "Score: 0";
  ground.style.transform = "translateX(0)";
}

/* LOOP */
function gameLoop() {
  if (!gameRunning) return;

  velocity -= 1;
  position += velocity;

  if (position <= 0) {
    position = 0;
    velocity = 0;
    jumpCount = 0;
  }

  dino.style.bottom = (20 + position) + "px";

  requestAnimationFrame(gameLoop);
}

/* JUMP */
document.addEventListener("keydown", e => {
  if (!gameRunning || gameOver) return;

  if (e.code === "Space" && jumpCount < 2) {
    velocity = 15;
    jumpCount++;
  }
});

/* OBSTACLE */
function spawnObstacle() {
  if (!gameRunning) return;

  const obs = document.createElement("div");
  obs.classList.add("obstacle");

  let size = Math.random() * 20 + 40;

  obs.style.width = size + "px";
  obs.style.height = size + "px";
  obs.style.right = "-60px";

  game.appendChild(obs);
  lastObstacle = obs;

  let move = setInterval(() => {
    if (!gameRunning || gameOver) return;

    let right = parseInt(getComputedStyle(obs).right);
    obs.style.right = right + speed + "px";

    if (
      right > window.innerWidth - 120 &&
      right < window.innerWidth - 40 &&
      position < size
    ) {
      triggerGameOver();
    }

    if (right > window.innerWidth) {
      obs.remove();
      clearInterval(move);
    }

  }, 20);

  intervals.push(move);

  let t = setTimeout(spawnObstacle, 1500);
  timeouts.push(t);
}

/* GROUND */
function moveGround() {
  let groundInterval = setInterval(() => {
    if (!gameRunning) return;

    groundPos += speed;
    ground.style.transform = `translateX(-${groundPos}px)`;
  }, 20);

  intervals.push(groundInterval);
}

/* SCORE */
function startScore() {
  let scoreInt = setInterval(() => {
    if (!gameRunning) return;

    score++;
    scoreDisplay.innerHTML = "Score: " + score;
  }, 100);

  intervals.push(scoreInt);
}

/* 💥 EXPLOSION (FIXED SINGLE TRIGGER) */
function explode() {
  if (explosionTriggered) return;
  explosionTriggered = true;

  const boom = document.createElement("div");
  boom.classList.add("explosion");

  const dinoX = dino.offsetLeft;
  const obsX = game.offsetWidth - parseInt(getComputedStyle(lastObstacle).right);

  const centerX = (dinoX + obsX) / 2;

  boom.style.left = (centerX - 175) + "px";
  boom.style.bottom = (20 + position - 100) + "px";

  game.appendChild(boom);

  game.classList.add("shake");
  setTimeout(() => game.classList.remove("shake"), 400);
}

/* GAME OVER */
function triggerGameOver() {
  if (gameOver) return;

  gameOver = true;
  gameRunning = false;

  explode();

  intervals.forEach(clearInterval);
  timeouts.forEach(clearTimeout);

  menu.style.display = "block";
}

</script>

</body>
</html>
