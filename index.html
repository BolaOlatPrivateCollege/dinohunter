<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dino Ghost Game Ultimate</title>

<style>
body {
  margin: 0;
  background: #f7f7f7;
  overflow: hidden;
  font-family: Arial;
}

body.night {
  background: #111;
  color: white;
}

#game {
  position: relative;
  width: 100%;
  height: 220px;
  border-bottom: 3px solid black;
}

body.night #game {
  border-color: white;
}

#dino {
  position: absolute;
  bottom: 0;
  left: 50px;
  width: 50px;
  height: 50px;
  background: url('https://i.imgur.com/4LGAZ8t.png') no-repeat center/contain;
}

/* Explosion */
.explosion {
  position: absolute;
  width: 60px;
  height: 60px;
  background: url('https://i.imgur.com/6X4FQZa.gif') no-repeat center/contain;
}

/* Obstacle */
.obstacle {
  position: absolute;
  bottom: 0;
  right: -60px;
  background: url('https://i.imgur.com/JYUB0m3.png') no-repeat center/contain;
}

/* Cloud */
.cloud {
  position: absolute;
  width: 60px;
  height: 30px;
  background: url('https://i.imgur.com/U2b6v4k.png') no-repeat center/contain;
  opacity: 0.8;
}

#score, #highScore {
  position: absolute;
  right: 20px;
}

#score { top: 10px; }
#highScore { top: 30px; }

#menu {
  position: absolute;
  top: 40%;
  width: 100%;
  text-align: center;
}

button {
  padding: 10px 20px;
  margin: 5px;
  cursor: pointer;
}
</style>
</head>

<body>

<div id="menu">
  <h1>👻 Dino Ghost Game</h1>
  <button onclick="startGame()">Start</button>
  <button onclick="restartGame()">Restart</button>
  <button onclick="togglePause()">Pause / Resume</button>
</div>

<div id="game">
  <div id="dino"></div>
  <div id="score">Score: 0</div>
  <div id="highScore">High: 0</div>
</div>

<audio id="jumpSound" src="https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg"></audio>
<audio id="hitSound" src="https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg"></audio>

<script>
const game = document.getElementById("game");
const dino = document.getElementById("dino");
const scoreDisplay = document.getElementById("score");
const highScoreDisplay = document.getElementById("highScore");
const menu = document.getElementById("menu");

const jumpSound = document.getElementById("jumpSound");
const hitSound = document.getElementById("hitSound");

/* ===== HIGH SCORE ===== */
let highScore = localStorage.getItem("dinoHighScore") || 0;
highScoreDisplay.innerHTML = "High: " + highScore;

let score = 0;
let speed = 4;
let gameRunning = false;
let paused = false;

/* ===== START ===== */
function startGame() {
  menu.style.display = "none";
  gameRunning = true;
  loop();
  createObstacle();
  createCloud();
}

function restartGame() {
  location.reload();
}

function togglePause() {
  paused = !paused;
}

/* ===== DOUBLE JUMP ===== */
let velocity = 0;
let gravity = 1;
let position = 0;
let jumpCount = 0;

function loop() {
  if (!gameRunning) return;

  if (!paused) {
    velocity -= gravity;
    position += velocity;

    if (position <= 0) {
      position = 0;
      velocity = 0;
      jumpCount = 0;
    }

    dino.style.bottom = position + "px";
  }

  requestAnimationFrame(loop);
}

function jump() {
  if (jumpCount < 2) {
    velocity = 15;
    jumpCount++;
    jumpSound.play();
  }
}

document.addEventListener("keydown", e => {
  if (e.code === "Space") jump();
});

document.addEventListener("touchstart", jump);

/* ===== OBSTACLES ===== */
function createObstacle() {
  if (!gameRunning) return;

  const obstacle = document.createElement("div");
  obstacle.classList.add("obstacle");

  let height = Math.random() * 40 + 30;
  let width = Math.random() * 30 + 30;

  obstacle.style.height = height + "px";
  obstacle.style.width = width + "px";
  obstacle.style.right = "-60px";

  game.appendChild(obstacle);

  let move = setInterval(() => {
    if (paused) return;

    let right = parseInt(getComputedStyle(obstacle).right);
    obstacle.style.right = right + speed + "px";

    if (right > window.innerWidth - 100 &&
        right < window.innerWidth - 50 &&
        position < height) {
      explode();
      gameOver();
      clearInterval(move);
    }

    if (right > window.innerWidth) {
      obstacle.remove();
      clearInterval(move);
    }
  }, 20);

  setTimeout(createObstacle, Math.random() * 2000 + 1000);
}

/* ===== CLOUD ===== */
function createCloud() {
  if (!gameRunning) return;

  const cloud = document.createElement("div");
  cloud.classList.add("cloud");

  cloud.style.bottom = (Math.random() * 100 + 80) + "px";
  cloud.style.right = "-60px";

  game.appendChild(cloud);

  let move = setInterval(() => {
    if (paused) return;

    let right = parseInt(getComputedStyle(cloud).right);
    cloud.style.right = right + 2 + "px";

    if (right > window.innerWidth) {
      cloud.remove();
      clearInterval(move);
    }
  }, 30);

  setTimeout(createCloud, Math.random() * 3000 + 2000);
}

/* ===== AI DIFFICULTY ===== */
function adjustDifficulty() {
  // smarter scaling
  speed = 4 + (score / 200);

  // cap speed
  if (speed > 12) speed = 12;
}

/* ===== SCORE ===== */
setInterval(() => {
  if (!gameRunning || paused) return;

  score++;
  scoreDisplay.innerHTML = "Score: " + score;

  adjustDifficulty();

  if (score % 500 === 0) {
    document.body.classList.toggle("night");
  }
}, 100);

/* ===== EXPLOSION ===== */
function explode() {
  const explosion = document.createElement("div");
  explosion.classList.add("explosion");

  explosion.style.left = "50px";
  explosion.style.bottom = position + "px";

  game.appendChild(explosion);

  setTimeout(() => explosion.remove(), 500);
}

/* ===== GAME OVER ===== */
function gameOver() {
  gameRunning = false;
  hitSound.play();

  if (score > highScore) {
    localStorage.setItem("dinoHighScore", score);
  }

  menu.style.display = "block";
  alert("Game Over! Score: " + score);
}
</script>

</body>
</html>
