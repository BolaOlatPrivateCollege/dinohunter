<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ghost Runner</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: Arial;
  transition: background 1s;
}

/* DAY / NIGHT */
.day { background: #87CEEB; }
.night { background: #0b1a2a; }

/* MENU */
#menu { text-align: center; color: white; }

/* GAME */
#game {
  position: relative;
  width: 100%;
  height: 250px;
  overflow: hidden;
}

/* 👻 FLOATING */
#dino {
  position: absolute;
  bottom: 20px;
  left: 50px;
  width: 70px;
  height: 70px;
  background: url('images/ghost.png') no-repeat center/contain;
  animation: float 2s ease-in-out infinite;
}

@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}

/* 🌵 */
.obstacle {
  position: absolute;
  bottom: 20px;
  right: -60px;
  background: url('images/cactus.png') no-repeat center/contain;
}

/* 🧠 BOSS */
.boss {
  background: red !important;
  border-radius: 10px;
}

/* ☁️ */
.cloud {
  position: absolute;
  width: 100px;
  height: 50px;
  background: url('images/cloud.png') no-repeat center/contain;
  opacity: 0.8;
}

/* GROUND */
#ground {
  position: absolute;
  bottom: 0;
  width: 200%;
  height: 20px;
  background: repeating-linear-gradient(#444 0 20px, transparent 20px 40px);
}

/* 💥 */
.explosion {
  position: absolute;
  width: 350px;
  height: 350px;
  background: url('images/explosion.gif') no-repeat center/contain;
  z-index: 999;
}

/* SCORE */
#score, #highScore {
  position: absolute;
  right: 20px;
  color: white;
  background: rgba(0,0,0,0.6);
  padding: 5px 10px;
}

#score { top: 10px; }
#highScore { top: 40px; }

/* SHAKE */
.shake { animation: shake 0.4s; }
@keyframes shake {
  25% { transform: translate(-10px,5px); }
  50% { transform: translate(10px,-5px); }
  75% { transform: translate(-5px,5px); }
}
</style>
</head>

<body class="day">

<div id="menu">
  <h1>👻 Ghost Runner</h1>
  <button onclick="startGame()">Start</button>
</div>

<div id="game">
  <div id="dino"></div>
  <div id="ground"></div>
  <div id="score">Score: 0</div>
  <div id="highScore">High: 0</div>
</div>

<script>

/* 🔊 SOUNDS */
const jumpSound = new Audio("sounds/jump.wav");
const boomSound = new Audio("sounds/explosion.wav");

/* PRELOAD */
["ghost.png","cactus.png","cloud.png","explosion.gif"].forEach(src=>{
  let img=new Image(); img.src="images/"+src;
});

/* ELEMENTS */
const game = document.getElementById("game");
const dino = document.getElementById("dino");
const scoreDisplay = document.getElementById("score");
const highScoreDisplay = document.getElementById("highScore");

/* STATE */
let gameRunning=false, gameOver=false;
let position=0, velocity=0, jumpCount=0;
let score=0, speed=4;
let intervals=[], timeouts=[];

/* 💾 HIGH SCORE */
let highScore = localStorage.getItem("ghostHigh") || 0;
highScoreDisplay.textContent = "High: " + highScore;

/* START */
function startGame(){
  resetGame();
  gameRunning=true;
  document.getElementById("menu").style.display="none";

  spawnObstacle();
  spawnCloud();
  moveGround();
  startScore();
  gameLoop();
}

/* RESET */
function resetGame(){
  intervals.forEach(clearInterval);
  timeouts.forEach(clearTimeout);
  document.querySelectorAll(".obstacle,.cloud,.explosion").forEach(e=>e.remove());

  score=0; speed=4; position=0; velocity=0;
  gameOver=false;
  scoreDisplay.textContent="Score: 0";
}

/* LOOP */
function gameLoop(){
  if(!gameRunning) return;

  velocity-=1;
  position+=velocity;

  if(position<=0){ position=0; velocity=0; jumpCount=0; }

  dino.style.bottom=(20+position)+"px";
  requestAnimationFrame(gameLoop);
}

/* 📱 + ⌨️ JUMP */
function jump(){
  if(!gameRunning || gameOver) return;
  if(jumpCount<2){
    velocity=15;
    jumpCount++;
    jumpSound.play();
  }
}

document.addEventListener("keydown", e=>{ if(e.code==="Space") jump(); });
document.addEventListener("touchstart", jump);

/* OBSTACLE + BOSS */
function spawnObstacle(){
  if(!gameRunning) return;

  const obs=document.createElement("div");
  obs.classList.add("obstacle");

  let size=Math.random()*20+40;

  /* 🧠 BOSS every 300 score */
  if(score>0 && score%300===0){
    size=100;
    obs.classList.add("boss");
  }

  obs.style.width=size+"px";
  obs.style.height=size+"px";
  obs.style.right="-60px";
  game.appendChild(obs);

  let move=setInterval(()=>{
    if(gameOver) return;

    let right=parseInt(getComputedStyle(obs).right);
    obs.style.right=right+speed+"px";

    const d=dino.getBoundingClientRect();
    const o=obs.getBoundingClientRect();

    if(d.left<o.right && d.right>o.left && d.bottom>o.top){
      triggerGameOver(obs);
    }

    if(right>window.innerWidth){
      obs.remove(); clearInterval(move);
    }

  },20);

  intervals.push(move);
  timeouts.push(setTimeout(spawnObstacle,1500));
}

/* CLOUD */
function spawnCloud(){
  const c=document.createElement("div");
  c.classList.add("cloud");
  c.style.bottom=(Math.random()*120+100)+"px";
  c.style.right="-100px";
  game.appendChild(c);

  let move=setInterval(()=>{
    let r=parseInt(getComputedStyle(c).right);
    c.style.right=r+2+"px";
    if(r>window.innerWidth){ c.remove(); clearInterval(move); }
  },30);

  intervals.push(move);
  timeouts.push(setTimeout(spawnCloud,3000));
}

/* GROUND */
function moveGround(){
  let pos=0;
  intervals.push(setInterval(()=>{
    if(!gameRunning) return;
    pos+=speed;
    ground.style.transform=`translateX(-${pos}px)`;
  },20));
}

/* SCORE + 🌙 DAY/NIGHT */
function startScore(){
  intervals.push(setInterval(()=>{
    if(!gameRunning || gameOver) return;

    score++;
    scoreDisplay.textContent="Score: "+score;

    if(score%50===0) speed+=0.5;

    /* 🌙 toggle */
    if(score%200===0){
      document.body.classList.toggle("night");
      document.body.classList.toggle("day");
    }

  },100));
}

/* 💥 */
function explode(obs){
  const boom=document.createElement("div");
  boom.classList.add("explosion");

  const r=obs.getBoundingClientRect();
  const g=game.getBoundingClientRect();

  boom.style.left=(r.left-g.left)+"px";
  boom.style.top=(r.top-g.top)+"px";

  game.appendChild(boom);
  boomSound.play();

  game.classList.add("shake");
  setTimeout(()=>game.classList.remove("shake"),400);

  setTimeout(()=>boom.remove(),600);
}

/* GAME OVER */
function triggerGameOver(obs){
  if(gameOver) return;

  gameOver=true;
  gameRunning=false;

  explode(obs);

  /* 💾 SAVE HIGH SCORE */
  if(score>highScore){
    localStorage.setItem("ghostHigh", score);
  }

  document.getElementById("menu").style.display="block";
}

</script>
</body>
</html>
