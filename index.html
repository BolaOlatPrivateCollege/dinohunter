<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dino Ghost Game</title>

<style>
body {
  margin: 0;
  background: #f7f7f7;
  overflow: hidden;
}

body.night {
  background: #111;
}

#game {
  position: relative;
  width: 100%;
  height: 220px;
  border-bottom: 3px solid black;
}

body.night #game {
  border-color: white;
}

/* Dino (ghost style) */
#dino {
  position: absolute;
  bottom: 0;
  left: 50px;
  width: 50px;
  height: 50px;
  background: url('https://i.imgur.com/4LGAZ8t.png') no-repeat center/contain;
}

/* Obstacles */
.obstacle {
  position: absolute;
  bottom: 0;
  right: -60px;
  background: url('https://i.imgur.com/JYUB0m3.png') no-repeat center/contain;
}

/* Clouds */
.cloud {
  position: absolute;
  width: 60px;
  height: 30px;
  background: url('https://i.imgur.com/U2b6v4k.png') no-repeat center/contain;
  opacity: 0.8;
}

#score {
  position: absolute;
  top: 10px;
  right: 20px;
  font-size: 18px;
  font-family: Arial;
}
</style>
</head>

<body>

<div id="game">
  <div id="dino"></div>
  <div id="score">0</div>
</div>

<script>
const game = document.getElementById("game");
const dino = document.getElementById("dino");
const scoreDisplay = document.getElementById("score");

let score = 0;
let gameRunning = true;

/* ===== DOUBLE JUMP SYSTEM ===== */
let velocity = 0;
let gravity = 1;
let position = 0;
let jumpCount = 0;

function applyGravity() {
  if (!gameRunning) return;

  velocity -= gravity;
  position += velocity;

  if (position <= 0) {
    position = 0;
    velocity = 0;
    jumpCount = 0;
  }

  dino.style.bottom = position + "px";
  requestAnimationFrame(applyGravity);
}

applyGravity();

document.addEventListener("keydown", (e) => {
  if (e.code === "Space" && jumpCount < 2) {
    velocity = 15;
    jumpCount++;
  }
});

/* ===== OBSTACLES ===== */
function createObstacle() {
  if (!gameRunning) return;

  const obstacle = document.createElement("div");
  obstacle.classList.add("obstacle");

  let height = Math.random() * 40 + 30;
  let width = Math.random() * 30 + 30;

  obstacle.style.height = height + "px";
  obstacle.style.width = width + "px";
  obstacle.style.right = "-60px";

  game.appendChild(obstacle);

  let move = setInterval(() => {
    let right = parseInt(getComputedStyle(obstacle).right);
    obstacle.style.right = right + 6 + "px";

    let dinoBottom = position;

    if (right > window.innerWidth - 100 &&
        right < window.innerWidth - 50 &&
        dinoBottom < height) {
      gameOver();
      clearInterval(move);
    }

    if (right > window.innerWidth) {
      obstacle.remove();
      clearInterval(move);
    }
  }, 20);

  setTimeout(createObstacle, Math.random() * 2000 + 1000);
}

/* ===== CLOUDS ===== */
function createCloud() {
  if (!gameRunning) return;

  const cloud = document.createElement("div");
  cloud.classList.add("cloud");

  let height = Math.random() * 100 + 80;
  cloud.style.bottom = height + "px";
  cloud.style.right = "-60px";

  game.appendChild(cloud);

  let move = setInterval(() => {
    let right = parseInt(getComputedStyle(cloud).right);
    cloud.style.right = right + 3 + "px";

    if (right > window.innerWidth) {
      cloud.remove();
      clearInterval(move);
    }
  }, 30);

  setTimeout(createCloud, Math.random() * 3000 + 2000);
}

/* ===== SCORE + NIGHT MODE ===== */
setInterval(() => {
  if (!gameRunning) return;

  score++;
  scoreDisplay.innerHTML = score;

  if (score % 500 === 0) {
    document.body.classList.toggle("night");
  }
}, 100);

/* ===== GAME OVER ===== */
function gameOver() {
  gameRunning = false;
  alert("Game Over! Score: " + score);
  location.reload();
}

/* START */
createObstacle();
createCloud();

</script>

</body>
</html>
