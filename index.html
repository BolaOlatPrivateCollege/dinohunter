<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ghost Runner Ultimate</title>

<style>
body {
  margin: 0;
  background: #f7f7f7;
  overflow: hidden;
  font-family: Arial;
}

body.night {
  background: #111;
  color: white;
}

#game {
  position: relative;
  width: 100%;
  height: 250px;
  border-bottom: 3px solid black;
}

body.night #game {
  border-color: white;
}

/* 👻 Ghost */
#dino {
  position: absolute;
  bottom: 0;
  left: 50px;
  width: 70px;
  height: 70px;
  background-size: contain;
  background-repeat: no-repeat;
}

/* 🌵 Cactus */
.obstacle {
  position: absolute;
  bottom: 0;
  right: -60px;
  background: url('images/cactus.png') no-repeat center/contain;
}

/* ☁️ Cloud */
.cloud {
  position: absolute;
  width: 100px;
  height: 50px;
  background: url('images/cloud.png') no-repeat center/contain;
  opacity: 0.8;
}

/* 💥 Explosion */
.explosion {
  position: absolute;
  width: 80px;
  height: 80px;
  background: url('images/explosion.gif') no-repeat center/contain;
}

#score, #highScore {
  position: absolute;
  right: 20px;
}

#score { top: 10px; }
#highScore { top: 30px; }

#menu {
  position: absolute;
  top: 35%;
  width: 100%;
  text-align: center;
}

button {
  padding: 10px 20px;
  margin: 5px;
  cursor: pointer;
}
</style>
</head>

<body>

<div id="menu">
  <h1>👻 Ghost Runner</h1>
  <button onclick="startGame()">Start</button>
  <button onclick="resetGame()">Restart</button>
</div>

<div id="game">
  <div id="dino"></div>
  <div id="score">Score: 0</div>
  <div id="highScore">High: 0</div>
</div>

<!-- 🔊 SOUND -->
<audio id="jumpSound" src="https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg"></audio>
<audio id="hitSound" src="https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg"></audio>
<audio id="bgMusic" src="https://actions.google.com/sounds/v1/ambiences/barnyard.ogg" loop></audio>

<script>
const game = document.getElementById("game");
const dino = document.getElementById("dino");
const scoreDisplay = document.getElementById("score");
const highScoreDisplay = document.getElementById("highScore");
const menu = document.getElementById("menu");

const jumpSound = document.getElementById("jumpSound");
const hitSound = document.getElementById("hitSound");
const bgMusic = document.getElementById("bgMusic");

/* ===== STATE ===== */
let score = 0;
let speed = 4;
let gameRunning = false;
let gameOverState = false;

let velocity = 0;
let position = 0;
let jumpCount = 0;

let obstacles = [];
let clouds = [];
let intervals = [];
let scoreInterval;

/* ===== HIGH SCORE ===== */
let highScore = localStorage.getItem("dinoHighScore") || 0;
highScoreDisplay.innerHTML = "High: " + highScore;

/* ===== 👻 GHOST ANIMATION ===== */
const frames = [
  "images/ghost1.png",
  "images/ghost2.png",
  "images/ghost3.png",
  "images/ghost4.png"
];

let frameIndex = 0;

let animationInterval = setInterval(() => {
  if (!gameRunning) return;

  dino.style.backgroundImage = `url(${frames[frameIndex]})`;
  frameIndex = (frameIndex + 1) % frames.length;

}, 120);

/* ===== START ===== */
function startGame() {
  if (gameRunning) return;

  menu.style.display = "none";
  gameRunning = true;
  gameOverState = false;

  bgMusic.currentTime = 0;
  bgMusic.volume = 0.3;
  bgMusic.play();

  loop();
  spawnObstacle();
  spawnCloud();
  startScore();
}

/* ===== RESET ===== */
function resetGame() {

  obstacles.forEach(o => o.remove());
  clouds.forEach(c => c.remove());

  intervals.forEach(i => clearInterval(i));
  clearInterval(scoreInterval);

  bgMusic.pause();

  score = 0;
  speed = 4;
  velocity = 0;
  position = 0;
  jumpCount = 0;

  gameRunning = false;
  gameOverState = false;

  frameIndex = 0;

  dino.style.bottom = "0px";
  scoreDisplay.innerHTML = "Score: 0";

  menu.style.display = "block";
}

/* ===== LOOP ===== */
function loop() {
  if (!gameRunning) return;

  velocity -= 1;
  position += velocity;

  if (position <= 0) {
    position = 0;
    velocity = 0;
    jumpCount = 0;
  }

  dino.style.bottom = position + "px";

  requestAnimationFrame(loop);
}

/* ===== JUMP ===== */
function jump() {
  if (!gameRunning || gameOverState) return;

  if (jumpCount < 2) {
    velocity = 15;
    jumpCount++;

    jumpSound.currentTime = 0;
    jumpSound.play();
  }
}

document.addEventListener("keydown", e => {
  if (e.code === "Space") jump();
});
document.addEventListener("touchstart", jump);

/* ===== OBSTACLES ===== */
function spawnObstacle() {
  if (!gameRunning) return;

  let count = Math.random() < 0.4 ? 2 : 1;

  for (let i = 0; i < count; i++) {
    const obs = document.createElement("div");
    obs.classList.add("obstacle");

    let size = Math.random() * 20 + 40;

    obs.style.width = size + "px";
    obs.style.height = size + "px";
    obs.style.right = (-60 - i * 50) + "px";

    game.appendChild(obs);
    obstacles.push(obs);

    let move = setInterval(() => {
      if (gameOverState) return;

      let right = parseInt(getComputedStyle(obs).right);
      obs.style.right = right + speed + "px";

      if (!gameOverState &&
          right > window.innerWidth - 120 &&
          right < window.innerWidth - 40 &&
          position < size) {

        explode();
        endGame();
      }

      if (right > window.innerWidth) {
        obs.remove();
        clearInterval(move);
      }

    }, 20);

    intervals.push(move);
  }

  setTimeout(spawnObstacle, Math.random() * 2000 + 1000);
}

/* ===== CLOUD ===== */
function spawnCloud() {
  if (!gameRunning) return;

  const cloud = document.createElement("div");
  cloud.classList.add("cloud");

  cloud.style.bottom = (Math.random() * 120 + 100) + "px";
  cloud.style.right = "-100px";

  game.appendChild(cloud);
  clouds.push(cloud);

  let move = setInterval(() => {
    let right = parseInt(getComputedStyle(cloud).right);
    cloud.style.right = right + 2 + "px";

    if (right > window.innerWidth) {
      cloud.remove();
      clearInterval(move);
    }
  }, 30);

  intervals.push(move);

  setTimeout(spawnCloud, Math.random() * 3000 + 2000);
}

/* ===== SCORE ===== */
function startScore() {
  scoreInterval = setInterval(() => {
    if (!gameRunning) return;

    score++;
    scoreDisplay.innerHTML = "Score: " + score;

    speed = 4 + (score / 200);
    if (speed > 12) speed = 12;

    if (score % 500 === 0) {
      document.body.classList.toggle("night");
    }
  }, 100);
}

/* ===== EXPLOSION ===== */
function explode() {
  const boom = document.createElement("div");
  boom.classList.add("explosion");

  boom.style.left = "50px";
  boom.style.bottom = position + "px";

  game.appendChild(boom);

  setTimeout(() => boom.remove(), 500);
}

/* ===== END GAME ===== */
function endGame() {
  if (gameOverState) return;

  gameOverState = true;
  gameRunning = false;

  intervals.forEach(i => clearInterval(i));
  clearInterval(scoreInterval);

  bgMusic.pause();

  hitSound.currentTime = 0;
  hitSound.play();

  if (score > highScore) {
    localStorage.setItem("dinoHighScore", score);
  }

  menu.style.display = "block";
}

/* INIT */
resetGame();
</script>

</body>
</html>
